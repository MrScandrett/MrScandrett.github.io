<svg xmlns="http://www.w3.org/2000/svg" width="768" height="488" viewBox="0 0 768 488" role="img" aria-label="ELIZA terminal style thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20262d"/>
      <stop offset="100%" stop-color="#161c22"/>
    </linearGradient>
  </defs>
  <rect width="768" height="488" fill="url(#bg)"/>
  <rect x="0" y="0" width="768" height="488" fill="#0e141a" opacity="0.16"/>
  <g fill="#f2f6fb" font-family="'Courier New', Courier, monospace">
    <text x="26" y="30" font-size="31">Welcome to</text>
    <text x="206" y="74" font-size="38" letter-spacing="1.2">EEEEEE  LL    IIII  ZZZZZZ  AAAAA</text>
    <text x="206" y="106" font-size="38" letter-spacing="1.2">EE      LL      II      ZZ   AA  AA</text>
    <text x="206" y="138" font-size="38" letter-spacing="1.2">EEEEE   LL      II    ZZZ    AAAAAAA</text>
    <text x="206" y="170" font-size="38" letter-spacing="1.2">EE      LL      II    ZZ     AA   AA</text>
    <text x="206" y="202" font-size="38" letter-spacing="1.2">EEEEEE  LLLLLL  IIII  ZZZZZZ  AA   AA</text>
  </g>
  <g fill="#e9eff7" font-family="'Courier New', Courier, monospace" font-size="34">
    <text x="26" y="262">Eliza is a mock Rogerian psychotherapist.</text>
    <text x="26" y="300">Program by Joseph Weizenbaum (1966).</text>
  </g>
  <g fill="#ffffff" font-family="'Courier New', Courier, monospace" font-size="38">
    <text x="26" y="366">ELIZA: Is something troubling you?</text>
    <text x="26" y="408">YOU:   Men are all alike.</text>
    <text x="26" y="450">ELIZA: Can you think of a specific example?</text>
  </g>
</svg>
