<svg xmlns="http://www.w3.org/2000/svg" width="690" height="364" viewBox="0 0 690 364" role="img" aria-label="A star grid pathfinding thumbnail">
  <rect width="690" height="364" fill="#e5e5e5"/>

  <!-- grid frame -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="640" height="320" fill="#efefef" stroke="#111" stroke-width="2"/>

    <!-- blocked cells -->
    <g fill="#3a3a3d">
      <!-- row 1 -->
      <rect x="320" y="0" width="80" height="80"/>
      <rect x="400" y="0" width="80" height="80"/>
      <rect x="480" y="0" width="80" height="80"/>
      <rect x="560" y="0" width="80" height="80"/>
      <!-- row 2 -->
      <rect x="400" y="80" width="80" height="80"/>
      <rect x="480" y="80" width="80" height="80"/>
      <rect x="560" y="80" width="80" height="80"/>
      <!-- row 3 -->
      <rect x="0" y="160" width="80" height="80"/>
      <rect x="80" y="160" width="80" height="80"/>
      <rect x="240" y="160" width="80" height="80"/>
      <rect x="320" y="160" width="80" height="80"/>
      <!-- row 4 -->
      <rect x="0" y="240" width="80" height="80"/>
    </g>

    <!-- grid lines -->
    <g stroke="#111" stroke-width="2">
      <line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="320" y1="0" x2="320" y2="320"/>
      <line x1="400" y1="0" x2="400" y2="320"/>
      <line x1="480" y1="0" x2="480" y2="320"/>
      <line x1="560" y1="0" x2="560" y2="320"/>

      <line x1="0" y1="80" x2="640" y2="80"/>
      <line x1="0" y1="160" x2="640" y2="160"/>
      <line x1="0" y1="240" x2="640" y2="240"/>
    </g>

    <!-- path polyline -->
    <polyline points="40,40 120,120 200,200 200,280 280,280 360,280 440,280 520,280 600,280"
      fill="none" stroke="#111" stroke-width="3"/>

    <!-- path waypoints -->
    <g fill="#000">
      <circle cx="120" cy="120" r="6"/>
      <circle cx="200" cy="200" r="6"/>
      <circle cx="200" cy="280" r="6"/>
      <circle cx="280" cy="280" r="6"/>
      <circle cx="360" cy="280" r="6"/>
      <circle cx="440" cy="280" r="6"/>
      <circle cx="520" cy="280" r="6"/>
    </g>

    <!-- start/goal -->
    <circle cx="40" cy="40" r="21" fill="#b60000"/>
    <circle cx="600" cy="280" r="22" fill="#00a400"/>
  </g>
</svg>
