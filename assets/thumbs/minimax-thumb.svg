<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Minimax tic-tac-toe tree thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f5f9" />
      <stop offset="1" stop-color="#dde3ed" />
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#263142" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <text x="800" y="95" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="#111827">
    TIC-TAC-TOE MINIMAX TREE
  </text>

  <g stroke="#1f2937" stroke-width="5" fill="none" opacity="0.9">
    <line x1="800" y1="180" x2="330" y2="350" />
    <line x1="800" y1="180" x2="640" y2="350" />
    <line x1="800" y1="180" x2="960" y2="350" />
    <line x1="800" y1="180" x2="1270" y2="350" />

    <line x1="330" y1="350" x2="220" y2="520" />
    <line x1="330" y1="350" x2="330" y2="520" />
    <line x1="330" y1="350" x2="440" y2="520" />

    <line x1="640" y1="350" x2="530" y2="520" />
    <line x1="640" y1="350" x2="640" y2="520" />
    <line x1="640" y1="350" x2="750" y2="520" />

    <line x1="960" y1="350" x2="850" y2="520" />
    <line x1="960" y1="350" x2="960" y2="520" />
    <line x1="960" y1="350" x2="1070" y2="520" />

    <line x1="1270" y1="350" x2="1160" y2="520" />
    <line x1="1270" y1="350" x2="1270" y2="520" />
    <line x1="1270" y1="350" x2="1380" y2="520" />
  </g>

  <g fill="#ffffff" stroke="#111827" stroke-width="4" filter="url(#soft)">
    <circle cx="800" cy="180" r="34" />

    <circle cx="330" cy="350" r="28" />
    <circle cx="640" cy="350" r="28" />
    <circle cx="960" cy="350" r="28" />
    <circle cx="1270" cy="350" r="28" />

    <circle cx="220" cy="520" r="22" />
    <circle cx="330" cy="520" r="22" />
    <circle cx="440" cy="520" r="22" />
    <circle cx="530" cy="520" r="22" />
    <circle cx="640" cy="520" r="22" />
    <circle cx="750" cy="520" r="22" />
    <circle cx="850" cy="520" r="22" />
    <circle cx="960" cy="520" r="22" />
    <circle cx="1070" cy="520" r="22" />
    <circle cx="1160" cy="520" r="22" />
    <circle cx="1270" cy="520" r="22" />
    <circle cx="1380" cy="520" r="22" />
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#0f172a">
    <text x="800" y="188" font-size="26" text-anchor="middle" font-weight="700">MAX</text>
    <text x="330" y="358" font-size="20" text-anchor="middle">MIN</text>
    <text x="640" y="358" font-size="20" text-anchor="middle">MIN</text>
    <text x="960" y="358" font-size="20" text-anchor="middle">MIN</text>
    <text x="1270" y="358" font-size="20" text-anchor="middle">MIN</text>
  </g>

  <g font-family="Courier New, monospace" font-size="22" font-weight="700" fill="#1e3a8a">
    <text x="220" y="528" text-anchor="middle">+1</text>
    <text x="330" y="528" text-anchor="middle">0</text>
    <text x="440" y="528" text-anchor="middle">-1</text>
    <text x="530" y="528" text-anchor="middle">0</text>
    <text x="640" y="528" text-anchor="middle">+1</text>
    <text x="750" y="528" text-anchor="middle">-1</text>
    <text x="850" y="528" text-anchor="middle">+1</text>
    <text x="960" y="528" text-anchor="middle">0</text>
    <text x="1070" y="528" text-anchor="middle">-1</text>
    <text x="1160" y="528" text-anchor="middle">-1</text>
    <text x="1270" y="528" text-anchor="middle">0</text>
    <text x="1380" y="528" text-anchor="middle">+1</text>
  </g>

  <text x="800" y="790" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#111827">
    Lesson 05: 1v1 Game AI with Minimax
  </text>
  <text x="800" y="834" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle" fill="#334155">
    Evaluate states, back up values, choose the best move
  </text>
</svg>
