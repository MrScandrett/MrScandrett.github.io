<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Mechanical Turk explanatory plates</title>
  <desc id="desc">A black-and-white engraving style image showing four views of the Mechanical Turk with white outlines indicating the hidden human operator inside the cabinet.</desc>
  <defs>
    <style>
      .paper { fill: #f5f2ea; }
      .line { fill: none; stroke: #161616; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .fine { fill: none; stroke: #161616; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #1b1b1b; font: italic 30px Georgia, "Times New Roman", serif; }
      .panel-label { fill: #1b1b1b; font: italic 34px Georgia, "Times New Roman", serif; }
      .shade { fill: #222; }
      .light-shade { fill: #363636; }
      .operator-shadow { fill: none; stroke: #161616; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; opacity: 0.55; }
      .operator { fill: none; stroke: #f8f8f6; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#2b2b2b" stroke-width="2"/>
    </pattern>
    <pattern id="crosshatch" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#2a2a2a"/>
      <path d="M0 0 L12 12 M12 0 L0 12" stroke="#404040" stroke-width="1.2"/>
    </pattern>
    <g id="turk-body">
      <ellipse cx="0" cy="-48" rx="50" ry="58" fill="url(#hatch)"/>
      <path d="M-44 -88 q44 -48 92 0" class="line"/>
      <path d="M-55 -44 q56 28 108 0" class="fine"/>
      <path d="M-32 6 q32 -34 64 0" class="fine"/>
      <path d="M-65 6 q-6 90 -8 155" class="line"/>
      <path d="M65 4 q44 20 74 38 q36 20 54 16" class="line"/>
      <path d="M-42 154 q-8 94 38 180" class="line"/>
      <path d="M-10 156 q16 74 40 176" class="line"/>
      <path d="M176 58 q12 74 28 134 q18 70 66 116" class="line"/>
      <path d="M94 26 q70 46 102 38" class="fine"/>
      <ellipse cx="-12" cy="-44" rx="8" ry="10" fill="#161616"/>
      <ellipse cx="18" cy="-44" rx="8" ry="10" fill="#161616"/>
      <path d="M-24 -14 q24 18 48 0" class="fine"/>
    </g>
    <g id="cabinet-front">
      <rect x="0" y="0" width="360" height="212" fill="url(#crosshatch)" stroke="#161616" stroke-width="6"/>
      <rect x="20" y="18" width="120" height="172" fill="#181818" stroke="#161616" stroke-width="4"/>
      <rect x="156" y="18" width="184" height="172" fill="#181818" stroke="#161616" stroke-width="4"/>
      <line x1="180" y1="18" x2="180" y2="190" class="fine"/>
      <line x1="244" y1="18" x2="244" y2="190" class="fine"/>
      <line x1="0" y1="108" x2="360" y2="108" class="fine"/>
      <rect x="112" y="-26" width="196" height="32" fill="#181818" stroke="#161616" stroke-width="4"/>
      <rect x="136" y="-22" width="148" height="24" fill="#f0f0ed" stroke="#161616" stroke-width="3"/>
      <path d="M34 212 v20 M320 212 v20" class="line"/>
      <circle cx="34" cy="238" r="10" fill="#161616"/>
      <circle cx="320" cy="238" r="10" fill="#161616"/>
      <path d="M360 18 h86" class="line"/>
      <circle cx="448" cy="18" r="9" fill="#161616"/>
    </g>
    <g id="cabinet-side">
      <rect x="0" y="0" width="312" height="212" fill="url(#crosshatch)" stroke="#161616" stroke-width="6"/>
      <rect x="24" y="18" width="116" height="172" fill="#181818" stroke="#161616" stroke-width="4"/>
      <rect x="156" y="18" width="132" height="172" fill="#181818" stroke="#161616" stroke-width="4"/>
      <path d="M0 108 h312" class="fine"/>
      <path d="M26 212 v20 M286 212 v20" class="line"/>
      <circle cx="26" cy="238" r="10" fill="#161616"/>
      <circle cx="286" cy="238" r="10" fill="#161616"/>
      <rect x="-62" y="116" width="62" height="22" fill="#161616"/>
      <rect x="100" y="-24" width="168" height="28" fill="#181818" stroke="#161616" stroke-width="4"/>
    </g>
    <g id="operator-front-1">
      <path d="M82 212 q44 -96 118 -110 q68 -14 138 38 q84 62 108 194" class="operator-shadow"/>
      <path d="M82 212 q44 -96 118 -110 q68 -14 138 38 q84 62 108 194" class="operator"/>
      <path d="M204 122 q-24 30 -28 74 q-8 54 26 112" class="operator-shadow"/>
      <path d="M204 122 q-24 30 -28 74 q-8 54 26 112" class="operator"/>
      <path d="M208 122 q28 10 42 46 q18 40 16 88" class="operator-shadow"/>
      <path d="M208 122 q28 10 42 46 q18 40 16 88" class="operator"/>
      <circle cx="204" cy="108" r="34" class="operator-shadow"/>
      <circle cx="204" cy="108" r="34" class="operator"/>
    </g>
    <g id="operator-side-2">
      <circle cx="208" cy="120" r="28" class="operator-shadow"/>
      <circle cx="208" cy="120" r="28" class="operator"/>
      <path d="M196 146 q-10 48 10 96 q16 40 44 72" class="operator-shadow"/>
      <path d="M196 146 q-10 48 10 96 q16 40 44 72" class="operator"/>
      <path d="M188 178 q-70 24 -112 88" class="operator-shadow"/>
      <path d="M188 178 q-70 24 -112 88" class="operator"/>
      <path d="M234 208 q18 96 20 160" class="operator-shadow"/>
      <path d="M234 208 q18 96 20 160" class="operator"/>
    </g>
    <g id="operator-front-3">
      <circle cx="140" cy="142" r="34" class="operator-shadow"/>
      <circle cx="140" cy="142" r="34" class="operator"/>
      <path d="M140 176 q-14 50 0 104 q14 48 42 96" class="operator-shadow"/>
      <path d="M140 176 q-14 50 0 104 q14 48 42 96" class="operator"/>
      <path d="M124 214 q-10 132 -48 214" class="operator-shadow"/>
      <path d="M124 214 q-10 132 -48 214" class="operator"/>
      <path d="M168 212 q54 74 84 204" class="operator-shadow"/>
      <path d="M168 212 q54 74 84 204" class="operator"/>
    </g>
    <g id="operator-front-4">
      <circle cx="264" cy="210" r="34" class="operator-shadow"/>
      <circle cx="264" cy="210" r="34" class="operator"/>
      <path d="M236 232 q-34 64 -8 140 q30 86 80 140" class="operator-shadow"/>
      <path d="M236 232 q-34 64 -8 140 q30 86 80 140" class="operator"/>
      <path d="M284 236 q66 50 110 164" class="operator-shadow"/>
      <path d="M284 236 q66 50 110 164" class="operator"/>
      <path d="M232 270 q-34 126 -126 212" class="operator-shadow"/>
      <path d="M232 270 q-34 126 -126 212" class="operator"/>
    </g>
  </defs>

  <rect width="1200" height="1000" class="paper"/>

  <text x="28" y="56" class="panel-label">Plate 1.</text>
  <text x="660" y="56" class="panel-label">Plate 2.</text>
  <text x="28" y="510" class="panel-label">Plate 3.</text>
  <text x="660" y="510" class="panel-label">Plate 4.</text>

  <g transform="translate(66 120)">
    <use href="#cabinet-front"/>
    <path d="M0 18 h-58 v174 h58" class="line"/>
    <path d="M146 18 q44 -48 110 -54 q42 -4 92 8" class="line"/>
    <use href="#turk-body" transform="translate(188 -6) scale(0.94)"/>
    <use href="#operator-front-1"/>
  </g>

  <g transform="translate(674 120)">
    <use href="#cabinet-side"/>
    <use href="#turk-body" transform="translate(136 -8) scale(0.94)"/>
    <path d="M310 60 q88 60 102 168" class="line"/>
    <use href="#operator-side-2"/>
  </g>

  <g transform="translate(66 574)">
    <use href="#cabinet-front"/>
    <path d="M0 18 h-64 v210 h64" class="line"/>
    <path d="M360 18 h64 v210 h-64" class="line"/>
    <use href="#turk-body" transform="translate(190 -8) scale(0.94)"/>
    <use href="#operator-front-3"/>
  </g>

  <g transform="translate(674 574)">
    <use href="#cabinet-front"/>
    <path d="M234 -24 v192" class="line"/>
    <path d="M246 -24 v192" class="fine"/>
    <use href="#turk-body" transform="translate(188 -8) scale(0.94)"/>
    <use href="#operator-front-4"/>
  </g>

  <text x="600" y="972" text-anchor="middle" class="label">Explanatory engraving of the Mechanical Turk, showing the hidden operator inside the cabinet.</text>
</svg>
