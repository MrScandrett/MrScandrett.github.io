<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Science Fiction and AI</title>
  <desc id="desc">A stylized red camera eye and robot silhouette representing HAL 9000 and science fiction robots.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090d17"/>
      <stop offset="100%" stop-color="#22283c"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#7c1d1d"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g transform="translate(170 160)">
    <rect x="0" y="30" width="420" height="270" rx="24" fill="#1e2536" stroke="#556078" stroke-width="6"/>
    <circle cx="210" cy="165" r="98" fill="#121722" stroke="#5b667f" stroke-width="8"/>
    <circle cx="210" cy="165" r="68" fill="url(#eyeGlow)"/>
    <circle cx="210" cy="165" r="20" fill="#ffd8d8"/>
  </g>
  <g transform="translate(720 130)">
    <rect x="78" y="60" width="200" height="300" rx="48" fill="#5a6f95"/>
    <circle cx="178" cy="42" r="52" fill="#8ca6d1"/>
    <circle cx="160" cy="36" r="9" fill="#10253f"/>
    <circle cx="196" cy="36" r="9" fill="#10253f"/>
    <rect x="42" y="140" width="40" height="165" rx="16" fill="#6d84ad"/>
    <rect x="274" y="140" width="40" height="165" rx="16" fill="#6d84ad"/>
    <rect x="118" y="350" width="35" height="140" rx="14" fill="#6d84ad"/>
    <rect x="204" y="350" width="35" height="140" rx="14" fill="#6d84ad"/>
  </g>
  <text x="72" y="80" fill="#e6edf9" font-size="42" font-family="Georgia, 'Times New Roman', serif">Science Fiction and AI Suspicion</text>
  <text x="72" y="122" fill="#cfdcf4" font-size="24" font-family="'Segoe UI', Arial, sans-serif">HAL 9000 and I, Robot made machine ethics part of mainstream culture</text>
</svg>
