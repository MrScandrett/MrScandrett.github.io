<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logic Wheels and Formal Reasoning</title>
  <desc id="desc">A stylized medieval-inspired logic wheel diagram with concentric circles and connecting lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#192233"/>
      <stop offset="100%" stop-color="#4b2f4f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8c58a"/>
      <stop offset="100%" stop-color="#bea569"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g transform="translate(600 338)">
    <circle r="230" fill="none" stroke="url(#ring)" stroke-width="12"/>
    <circle r="165" fill="none" stroke="url(#ring)" stroke-width="10"/>
    <circle r="95" fill="none" stroke="url(#ring)" stroke-width="8"/>
    <circle r="18" fill="#d8c58a"/>
    <g stroke="#8fa9d8" stroke-width="3" opacity="0.8">
      <line x1="-230" y1="0" x2="230" y2="0"/>
      <line x1="0" y1="-230" x2="0" y2="230"/>
      <line x1="-163" y1="-163" x2="163" y2="163"/>
      <line x1="-163" y1="163" x2="163" y2="-163"/>
    </g>
    <g fill="#f1dfad" font-size="22" font-family="'Times New Roman', Georgia, serif" text-anchor="middle">
      <text x="0" y="-208">Reason</text>
      <text x="188" y="-8">Logic</text>
      <text x="0" y="220">Rules</text>
      <text x="-186" y="-8">Knowledge</text>
    </g>
  </g>
  <g fill="#d7e4fa" font-family="'Segoe UI', Arial, sans-serif">
    <text x="90" y="90" font-size="44">From Philosophy to Computation</text>
    <text x="90" y="132" font-size="24">Formal logic and symbol manipulation became foundations for AI reasoning systems</text>
  </g>
</svg>
