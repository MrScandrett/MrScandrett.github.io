<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horse Adventure</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="blocker">
    <div id="instructions">
        <span style="font-size:36px">Click to Play</span>
        <br /><br />
        Move: W, A, S, D<br/>
        Look: Mouse<br/>
        Interact: Left Click<br/>
        Inventory: I
    </div>
</div>
<div id="crosshair">+</div>

<div class="game-container">
    <h1>Horse Builder Adventure</h1>
    
    <div class="status-area">
        <div class="slot">
            <img src="https://placehold.co/64x64/5c3a21/ffffff?text=Wood" alt="Wood">
            <span id="wood">0</span>
        </div>
        <div class="slot">
            <img src="https://placehold.co/64x64/e3e3e3/000000?text=Qtz" alt="Quartz">
            <span id="quartz">0</span>
        </div>
        <div class="slot">
            <img id="horse-img" src="https://placehold.co/64x64/333/ffffff?text=?" alt="Horse">
            <span id="horse">None</span>
        </div>
        <div class="slot">
            <img src="https://placehold.co/64x64/7289da/ffffff?text=House" alt="House">
            <span id="house-status">No</span>
        </div>
        <div class="slot">
            <img src="https://placehold.co/64x64/8b4513/ffffff?text=Stable" alt="Stable">
            <span id="stable-status">No</span>
        </div>
        <div class="slot">
            <img src="https://placehold.co/64x64/d2691e/ffffff?text=Gear" alt="Gear">
            <span id="gear">None</span>
        </div>
    </div>

    <div id="log" class="log-area">Welcome! Find a horse, gather resources, build a home, and ride!</div>

    <div class="controls">
        <button id="btn-house" onclick="game.buildHouse()" disabled>Build House (20 Wood)</button>
        <button id="btn-stable" onclick="game.buildStable()" disabled>Build Stable (10 Wood, 5 Quartz)</button>
        <button id="btn-ride" onclick="game.ride()" disabled>Ride Horse</button>
    </div>

    <div id="name-area" class="input-group hidden">
        <input type="text" id="horse-name-input" placeholder="Enter horse name...">
        <button onclick="game.nameHorse()">Name It</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
