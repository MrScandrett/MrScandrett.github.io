<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>X and O's</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; margin:0; padding:0; display:flex; align-items:center; justify-content:center; height:100vh; background:transparent}
    .game{width:320px}
    .status{margin-bottom:10px; font-weight:bold}
    .board{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
    .cell{background:#f2f2f2; height:90px; display:flex; align-items:center; justify-content:center; font-size:48px; cursor:pointer; border-radius:8px; user-select:none}
    .controls{margin-top:12px; display:flex; gap:8px}
    button{padding:8px 12px; border-radius:6px; border:1px solid #aaa; background:white; cursor:pointer}
  </style>
</head>
<body>
  <div class="game">
    <div class="status" id="status">Your turn — you are X</div>
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    <div class="controls">
      <button id="restart">Restart</button>
      <button id="swap">Swap: You = X</button>
    </div>
  </div>

  <script src="tictactoe.js"></script>
</body>
</html>
