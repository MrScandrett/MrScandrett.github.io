<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Fortnite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= CANVAS ================= -->
    <canvas id="gameCanvas"></canvas>

    <!-- ================= HUD ================= -->

    <!-- Timer -->
    <div id="timer">1:00</div>

    <!-- Player Health -->
    <div id="player-health">
        <div class="health-fill"></div>
    </div>
    <div id="healthText">100</div>

    <!-- Ammo -->
    <div class="ammo-bar">
        <div class="fill"></div>
    </div>
    <div id="ammoText">10</div>

    <!-- Minimap -->
    <div id="minimap"></div>

    <!-- Storm Overlay -->
    <div id="stormOverlay"></div>

    <!-- Crosshair -->
    <div id="crosshair"></div>

    <!-- ================= START SCREEN ================= -->
    <!-- (Used by your existing game.js logic) -->
    <div id="startScreen">
        <button id="startButton">START GAME</button>
    </div>

    <!-- ================= GAME SCRIPT ================= -->
    <script type="module" src="game.js"></script>

</body>
</html>
