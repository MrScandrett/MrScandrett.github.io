<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiju Battleground</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        .hidden { display: none !important; }
        
        /* Home Screen Styles */
        #home-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #000);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #home-screen h1 { font-size: 64px; margin-bottom: 20px; text-shadow: 0 0 20px red; }
        
        .kaiju-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .kaiju-btn {
            width: 120px; height: 120px;
            background: #333;
            border: 3px solid #555;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .kaiju-btn:hover { background: #444; border-color: #888; }
        .kaiju-btn.selected { border-color: lime; background: #222; box-shadow: 0 0 15px lime; }
        .kaiju-btn:disabled { opacity: 0.3; cursor: default; border-color: #333; }
        
        #play-btn {
            padding: 15px 60px;
            font-size: 32px;
            background: lime;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        #play-btn:hover { background: #32ff32; transform: scale(1.05); }

        .mode-btn {
            padding: 10px 20px;
            background: #333;
            border: 2px solid #555;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-family: sans-serif;
            text-transform: uppercase;
        }
        .mode-btn:hover { background: #444; }
        .mode-btn.selected {
            background: #00aaff;
            border-color: white;
            box-shadow: 0 0 10px #00aaff;
        }

        /* Pause Menu Styles */
        #pause-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .pause-content {
            text-align: center;
            background: #1a1a1a;
            padding: 40px 80px;
            border: 2px solid #555;
            box-shadow: 0 0 20px black;
        }
        .pause-content h2 { font-size: 48px; margin-top: 0; margin-bottom: 30px; }
        .pause-content button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 24px;
            background: #444;
            border: 2px solid #666;
            color: white;
            cursor: pointer;
        }
        .pause-content button:hover { background: #555; border-color: #888; }
    </style>
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen">
        <h1>KAIJU BATTLEGROUND</h1>
        <div id="home-gcells" style="font-size: 24px; color: gold; margin-bottom: 20px; text-shadow: 0 0 5px orange;">Gcells: 0</div>
        <p>Select your Monster</p>
        <div class="kaiju-grid" id="kaiju-grid">
            <!-- Buttons generated by JS -->
        </div>
        
        <div id="mode-select-container" style="margin-bottom: 20px; text-align: center;">
            <p style="margin: 10px 0; color: #aaa;">Select Game Mode</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="mode-survival" class="mode-btn selected">Survival</button>
                <button id="mode-boss" class="mode-btn">Boss Battle</button>
            </div>
        </div>

        <div id="ult-select-container" style="margin-bottom: 20px; text-align: center;">
            <p style="margin: 10px 0; color: #aaa;">Select Ultimate Move</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="ult-thermo" class="mode-btn selected">Thermo Pulse</button>
                <button id="ult-burning" class="mode-btn">Burning Breath</button>
            </div>
        </div>

       <button id="play-btn">PLAY</button>
    </div>

    <!-- Game UI (Hidden initially) -->
    <h1 id="game-title" class="hidden">Kaiju Battleground</h1>
    <div id="game-gcells" class="hidden" style="position: absolute; top: 20px; right: 20px; font-size: 24px; color: gold; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 10;">Gcells: 0</div>

    <div id="top-ui" class="hidden">
        <div id="healthContainer">
            <span>Health</span>
            <div class="bar">
                <div id="playerHealth"></div>
            </div>
        </div>

        <div id="ultimateContainer">
            <span>Ultimate</span>
            <div class="bar">
                <div id="ultimateBar"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="600" class="hidden"></canvas>

    <!-- Pause Menu -->
    <div id="pause-menu" class="hidden">
        <div class="pause-content">
            <h2>PAUSED</h2>
            <button id="resume-btn">Resume</button>
            <button id="quit-btn">Quit to Menu</button>
        </div>
    </div>

    <div id="bottom-ui" class="hidden">
        <div class="move-slot" data-move="1">
            <div class="move-label">1: Tailwhip</div>
            <div class="cooldown-overlay" id="cd-1"></div>
        </div>
        <div class="move-slot" data-move="2">
            <div class="move-label">2: Stomp</div>
            <div class="cooldown-overlay" id="cd-2"></div>
        </div>
        <div class="move-slot" data-move="3">
            <div class="move-label">3: Bite</div>
            <div class="cooldown-overlay" id="cd-3"></div>
        </div>
        <div class="move-slot" data-move="4">
            <div class="move-label">4: Beam</div>
            <div class="cooldown-overlay" id="cd-4"></div>
        </div>
    </div>

    <p id="log" class="hidden"></p>

    <script src="script.js"></script>
</body>
</html>
