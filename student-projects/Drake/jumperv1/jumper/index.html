<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upward Jumper — Green Cube</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="hud">Score: 0</div>
    <div id="coins">Coins: 0</div>
    <div id="highscore">High: 0</div>
    <div id="message">Tap / Space to start</div>
    <div id="controls">
      <label>Difficulty:</label>
      <button class="diff btn" id="diff-peaceful">Peaceful</button>
      <button class="diff btn" id="diff-easy">Easy</button>
      <button class="diff btn active" id="diff-medium">Medium</button>
      <button class="diff btn" id="diff-hard">Hard</button>
    </div>
    <div id="new-high" class="hidden"></div>
    <div id="scoreboard"></div> 

    <nav id="tabs">
      <button id="tab-play" class="tab active">Play</button>
      <button id="tab-shop" class="tab">Shop</button>
    </nav>

    <div id="shop" class="hidden">
      <h3>Shop</h3>
      <div id="coin-balance">0</div>
      <div class="skins">
        <div class="skin" data-skin="gold">
          <div class="swatch" style="background:#ffd700"></div>
          <div class="meta">Gold</div>
          <div class="price">Price: 100</div>
          <button class="buy" data-skin="gold">Buy</button>
        </div>
        <div class="skin" data-skin="white">
          <div class="swatch" style="background:#ffffff;border:1px solid #ccc"></div>
          <div class="meta">White</div>
          <div class="price">Price: 50</div>
          <button class="buy" data-skin="white">Buy</button>
        </div>
        <div class="skin" data-skin="black">
          <div class="swatch" style="background:#000000"></div>
          <div class="meta">Black</div>
          <div class="price">Price: 25</div>
          <button class="buy" data-skin="black">Buy</button>
        </div>
        <div class="skin" data-skin="camo">
          <div class="swatch" style="background:linear-gradient(45deg,#6b8e23 0 49%,#3b6b2a 49% 51%,#6b8e23 51% 100%);"></div>
          <div class="meta">Camo</div>
          <div class="price">Price: 75</div>
          <button class="buy" data-skin="camo">Buy</button>
        </div>
      </div>
    </div> 
    <div class="wrap">
        <canvas id="game" width="420" height="720"></canvas>
    </div>

    <div class="touch-controls">
        <button id="left">◀</button>
        <button id="jump">▲</button>
        <button id="right">▶</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jumper Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="level-selector">
        <label for="level">Choose Level:</label>
        <select id="level">
            <option value="plains">Plains</option>
            <option value="forest">Forest</option>
            <option value="mountain">Mountain</option>
        </select>
    </div>

    <div id="game-container" class="plains">
        <canvas id="game" width="800" height="400"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
