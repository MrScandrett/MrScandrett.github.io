<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Mr. Scandrett's ClassroomOS</title>
  <meta name="description" content="Login required to access the ClassroomOS." />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script type="module" src="assets/js/auth.js"></script>
</head>
<body>
  <main id="main-content" class="login-main">
    <section class="login-card">
      <p class="pill">Protected ClassroomOS</p>
      <h1>Sign In</h1>
      <p>Use your approved account to enter ClassroomOS.</p>

      <form id="hub-login-form" class="stack" autocomplete="off">
        <label>
          <span class="label">Username</span>
          <input id="hub-login-user" type="text" required />
        </label>

        <label>
          <span class="label">Password</span>
          <input id="hub-login-pass" type="password" required />
        </label>

        <p id="hub-login-error" class="result-count" hidden></p>

        <button type="submit">Login</button>
      </form>

      <p class="result-count">Teacher default: <code>Champion</code> / <code>CPA</code></p>
      <p class="result-count">Student account request: open <code>http://localhost:8787/register</code> (portal backend).</p>
    </section>
  </main>
</body>
</html>
