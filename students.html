<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Students · MrScandrett Classroom Hub</title>
  <meta name="description" content="View students and all projects attributed to each student." />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script type="module" src="assets/js/auth.js"></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html">MrScandrett Classroom Hub</a>
      <nav class="site-nav" aria-label="Primary">
        <ul>
          <li><a data-page="index.html" href="index.html">Home</a></li>
          <li><a data-page="browse.html" href="browse.html">Browse</a></li>
          <li><a data-page="students.html" href="students.html">Students</a></li>
          <li><a data-page="about.html" href="about.html">About</a></li>
          <li><a href="login.html" data-logout>Logout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section class="page-hero">
      <h1>Students</h1>
      <p>Browse each student and the projects they have published in the hub.</p>
    </section>

    <section class="controls-panel" aria-label="Student controls">
      <div class="search-row">
        <label>
          <span class="label">Search students or project text</span>
          <input id="students-search" type="search" placeholder="Search students..." aria-label="Search students" />
        </label>
      </div>
    </section>

    <div class="grid-header">
      <p class="result-count" id="students-count" aria-live="polite">Loading students...</p>
    </div>

    <section id="students-list" class="students-list" aria-label="Students list"></section>
  </main>

  <footer class="site-footer">
    <p>Use pseudonyms or aliases when publishing student-facing showcases.</p>
  </footer>

  <script type="module" src="assets/js/students.js"></script>
</body>
</html>
