<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Game of Life — 30 Cells</title>
  <link rel="stylesheet" href="life-30.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <h1>Game of Life — 30 Cells</h1>
  <div id="controls">
    <button id="start">Start</button>
    <button id="stop" disabled>Stop</button>
    <button id="step">Step</button>
    <button id="randomize">Randomize</button>
    <button id="clear">Clear</button>
    <span style="margin-left:8px">Dice: <strong id="dice">1</strong></span>
    <button id="roll">Roll (1–4)</button>
    <span id="generation" style="margin-left:12px">Gen: 0</span>
  </div>

  <div id="grid" aria-label="game-of-life-grid"></div>

  <script src="life-30.js"></script>
</body>
</html>
