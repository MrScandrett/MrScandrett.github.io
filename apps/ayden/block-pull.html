<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Block Pull — Jenga Demo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    /* small overrides for the demo UI */
    #game-controls{display:flex;gap:.5rem;align-items:center;justify-content:flex-end}
    #hud{position:absolute;left:1rem;top:1rem;background:var(--glass);padding:.5rem .75rem;border-radius:8px;border:1px solid rgba(15,23,42,0.06)}
    #game-root{height:68vh;min-height:360px}
    .logo-n{ font-family: 'Playfair Display', serif; font-size:1.15rem; margin-right:0.06em }
  </style>
</head>
<body>
  <header class="card card--flat">
    <div class="container row items-center" style="padding:1rem 0">
      <div class="col">
        <h2 style="margin:0"><span class="logo-n">N</span>edya</h2>
      </div>
      <nav class="col text-right">
        <a class="btn btn-ghost" href="index.html">Home</a>
        <a class="btn btn-ghost btn-ghost--active" href="block-pull.html">Block Pull</a>
        <a class="btn btn-outline" href="#">Login</a>
      </nav>
    </div>
  </header>

  <main class="container mt-2">
    <section class="card" style="position:relative;overflow:hidden">
      <div id="hud">
        <span id="removed-count">Removed: 0</span>
      </div>
      <div id="game-controls" style="position:absolute;right:1rem;top:1rem;z-index:5">
        <button id="reset" class="btn btn-outline">Reset</button>
        <button id="help" class="btn btn-ghost">How to play</button>
      </div>
      <div id="game-root"></div>
    </section>
    <section class="mt-2">
      <h3>Instructions</h3>
      <p class="small">Click any block to pull it out. Blocks will animate away — the goal is to remove as many as you can. This is a simplified demo (no physics engine); feel free to tweak `block-pull.js`.</p>
    </section>
  </main>

  <script type="module" src="block-pull-physics.js"></script>
</body>
</html>
