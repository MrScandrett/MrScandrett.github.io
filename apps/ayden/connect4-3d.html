<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D Connect 4</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
    }
    #status { margin: 10px 0; font-weight: bold; }
    .yellow { color: #FFD700; }
    .red { color: #FF4444; }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    button { padding: 8px 16px; margin: 5px; font-size: 14px; cursor: pointer; }
    #columnButtons {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -320px);
      display: flex;
      gap: 16px;
      z-index: 10;
    }
    .colBtn {
      width: 50px;
      height: 50px;
      background: rgba(0, 255, 255, 0.8);
      border: 2px solid #00FFFF;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 0 10px #00FFFF;
    }
    .colBtn:hover { background: rgba(0, 255, 255, 1); box-shadow: 0 0 20px #00FFFF; }
    .colBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="ui">
    <div>3D Connect 4</div>
    <div id="status">Player (Blue) vs AI (Red)</div>
    <div id="turn">Your turn</div>
  </div>
  
  <div id="columnButtons"></div>
  
  <div id="controls">
    <div>Click column button to drop piece • R = Reset • Press 1-7</div>
    <button onclick="location.href='index.html'">← Back</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="connect4-3d.js"></script>
</body>
</html>
