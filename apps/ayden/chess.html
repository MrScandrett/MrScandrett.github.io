<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Play Chess vs AI</title>
  <link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/www/css/chessboard.css">
  <link rel="stylesheet" href="chess.css">
</head>
<body>
  <div class="app">
    <h1>Play Chess vs AI</h1>
    <div class="controls">
      <button id="newBtn">New Game</button>
      <button id="undoBtn">Undo</button>
      <label>AI Depth: <input id="depth" type="range" min="1" max="3" value="2"></label>
      <span id="depthVal">2</span>
      <span id="status" class="status">White to move</span>
    </div>

    <div id="board" class="board"></div>

    <p class="notes">Pieces via chessboard.js; engine rules by chess.js; AI: simple minimax.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
  <script src="https://unpkg.com/chessboardjs@1.0.0/www/js/chessboard.js"></script>
  <script src="main.js"></script>
</body>
</html>
