<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dino Jump</title>
  <style>
    body { margin: 0; overflow: hidden; background: transparent; font-family: Arial, sans-serif; }
    #canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
    #ui { position: absolute; top: 20px; left: 20px; color: #333; font-size: 18px; font-weight: bold; z-index: 101; }
    #score { margin-bottom: 10px; }
    #gameOverScreen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border-radius: 10px; color: white; text-align: center; z-index: 102; }
    #gameOverScreen h1 { font-size: 2.5em; margin: 0; }
    #finalScore { font-size: 1.5em; margin: 20px 0; }
    #restartBtn { padding: 10px 20px; font-size: 1.2em; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    #restartBtn:hover { background: #45a049; }
    #instructions { position: absolute; bottom: 20px; left: 20px; color: #333; font-size: 14px; z-index: 101; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
  </div>

  <div id="gameOverScreen">
    <h1>GAME OVER!</h1>
    <div id="finalScore">Score: 0</div>
    <button id="restartBtn">Play Again</button>
  </div>

  <div id="instructions">
    <strong>SPACE</strong> or <strong>CLICK</strong> to jump
  </div>

  <canvas id="canvas"></canvas>
  <script src="dino-jump.js"></script>
</body>
</html>
