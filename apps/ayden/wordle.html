<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Word Guessing - Wordle</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #121213;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 { margin: 0 0 20px; }
    #gameContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 20px;
    }
    .tile {
      width: 60px;
      height: 60px;
      border: 2px solid #3a3a3c;
      background: #1a1a1b;
      color: #fff;
      font-size: 32px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .tile.filled { border-color: #565758; }
    .tile.correct { background: #6aaa64; border-color: #6aaa64; }
    .tile.present { background: #c9b458; border-color: #c9b458; }
    .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
    #keyboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
      gap: 4px;
      max-width: 500px;
      margin-top: 20px;
    }
    .key {
      padding: 10px;
      background: #818384;
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      transition: background 0.2s;
    }
    .key:hover { background: #9ca3a3; }
    .key.correct { background: #6aaa64; }
    .key.present { background: #c9b458; }
    .key.absent { background: #3a3a3c; }
    #message {
      font-size: 18px;
      font-weight: bold;
      min-height: 30px;
      text-align: center;
    }
    #resetBtn {
      padding: 10px 20px;
      background: #6aaa64;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    #resetBtn:hover { background: #5a9a54; }
    #backBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 8px 16px;
      background: #565758;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="backBtn" onclick="location.href='index.html'">← Back</button>
  <h1>Word Guessing</h1>
  <div id="gameContainer">
    <div id="grid"></div>
    <div id="message"></div>
    <div id="keyboard"></div>
    <button id="resetBtn">New Game</button>
  </div>
  <script src="wordle.js"></script>
</body>
</html>
