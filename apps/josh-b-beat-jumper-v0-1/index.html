<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beat Jumper v0.1 · Scratch Player</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0f1724;
      color: #eef4ff;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .head, .foot {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      background: #111c2e;
    }
    .foot {
      border-top: 1px solid rgba(255,255,255,0.14);
      border-bottom: 0;
      font-size: 0.9rem;
      color: #d2dff5;
    }
    .head h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }
    .stage {
      padding: 0.8rem;
      display: grid;
      gap: 0.7rem;
      align-items: start;
      justify-items: center;
    }
    iframe {
      width: min(96vw, 980px);
      height: min(72vh, 760px);
      border: 0;
      border-radius: 10px;
      background: #0a0a0a;
    }
    .actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      color: #eef4ff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      background: #19283f;
      font-weight: 600;
      font-size: 0.9rem;
    }
    a:hover {
      background: #243b5e;
    }
  </style>
</head>
<body>
  <header class="head">
    <h1>Beat Jumper v0.1 · Scratch (.sb3)</h1>
  </header>
  <main class="stage">
    <iframe id="player" title="Scratch project player" allowfullscreen loading="eager"></iframe>
    <div class="actions">
      <a id="open-editor" target="_blank" rel="noopener noreferrer">Open in TurboWarp Editor</a>
      <a href="./project.sb3" download>Download .sb3</a>
    </div>
  </main>
  <footer class="foot">
    If the embed does not load, use "Open in TurboWarp Editor" or download the .sb3 file.
  </footer>
  <script>
    (function () {
      var fileUrl = new URL("./project.sb3", window.location.href).href;
      var embedUrl = "https://turbowarp.org/embed?autoplay&settings-button&project_url=" + encodeURIComponent(fileUrl);
      var editorUrl = "https://turbowarp.org/editor?project_url=" + encodeURIComponent(fileUrl);
      document.getElementById("player").src = embedUrl;
      document.getElementById("open-editor").href = editorUrl;
    })();
  </script>
</body>
</html>
